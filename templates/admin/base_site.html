{% extends "admin/base.html" %}
{% block title %}{{ title }} | ЛЕСПРОФБАЗА — админка{% endblock %}
{% block branding %}
<h1 id="site-name"><a href="{% url 'admin:index' %}">ЛЕСПРОФБАЗА · управление сайтом</a></h1>
{% endblock %}
{% block extrahead %}{{ block.super }}
<style>
.lpb-dot{display:inline-block;min-width:18px;height:18px;line-height:18px;padding:0 5px;margin-left:7px;
  background:#d23b2e;color:#fff;border-radius:999px;font-size:11px;font-weight:700;text-align:center;vertical-align:middle}
</style>
<script>
(function(){
  var O={{ admin_new_orders|default:0 }}, L={{ admin_new_leads|default:0 }};
  function tag(suffix,n){
    if(!n)return;
    document.querySelectorAll('a[href$="'+suffix+'"]').forEach(function(a){
      if(a.querySelector('.lpb-dot'))return;
      var s=document.createElement('span');s.className='lpb-dot';s.textContent=n;s.title='Новых: '+n;
      a.appendChild(s);
    });
  }
  document.addEventListener('DOMContentLoaded',function(){
    tag('/orders/order/',O);
    tag('/orders/lead/',L);
  });
})();
</script>
{% endblock %}
